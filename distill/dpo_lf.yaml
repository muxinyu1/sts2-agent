### Model
# checkpoint-1068-complete already contains the full model (LLM + visual tower)
# produced by sft.sh's post-training merge step.
model_name_or_path: ./saves/Qwen3.5-9B/SFT/checkpoint-1068-complete

### Method
stage: dpo
do_train: true
finetuning_type: full

### Dataset
# dpo_pairs_lf.jsonl is generated by dpo_lf.sh from dpo_pairs.jsonl with
# margins pre-scaled by 0.1 (HP-loss delta → DPO-compatible range).
dataset: sts2_dpo
dataset_dir: ./distill
template: qwen3
cutoff_len: 4096
max_samples: ~
overwrite_cache: true
preprocessing_num_workers: 8

### Output
output_dir: ./saves/Qwen3.5-9B/DPO
logging_dir: ./saves/Qwen3.5-9B/DPO/logs
logging_steps: 10
save_steps: 500
save_total_limit: 2
plot_loss: false
overwrite_output_dir: true

### Training
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 5.0e-7
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
gradient_checkpointing: true
ddp_timeout: 180000000
report_to: tensorboard
deepspeed: ./distill/ds_z3_config.json
# Freeze the visual tower: it won't be trained (text-only DPO data), and
# freezing avoids keeping its gradients in memory — critical for ZeRO-3 + DPO.
freeze_vision_tower: true

### DPO
# pref_beta * delta_r is the implicit-reward gap term.
# margin column (pre-scaled to ~[0, 8]) is subtracted from the gap:
#   loss = -log sigmoid(pref_beta * delta_r - margin)
pref_beta: 0.1
pref_loss: sigmoid
